<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QueerGO · 北京酷儿春游地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════
       QueerGO · Y2K Pearl-Prism Design System
       One source of truth. No overrides needed.
    ═══════════════════════════════════════════ */
    :root {
      /* ── Palette ── */
      --bg:            #EDE6FF;
      --surface:       rgba(255, 255, 255, 0.88);
      --surface2:      rgba(246, 241, 255, 0.72);
      --surface3:      rgba(237, 230, 255, 0.50);

      --border:        rgba(160, 120, 255, 0.15);
      --border-mid:    rgba(160, 120, 255, 0.28);
      --border-hi:     rgba(160, 120, 255, 0.50);

      --text:          #160030;
      --text-2:        #3B1F62;
      --muted:         #8B72AA;

      /* Prism accents */
      --pink:          #FF1AB8;
      --violet:        #7B2FFF;
      --cyan:          #00C8FF;
      --lime:          #AAFF00;

      /* Rainbow sequence */
      --r1: #FF3CAC; --r2: #FF8C00; --r3: #FFE000;
      --r4: #00E676; --r5: #00B4FF; --r6: #AA00FF;

      /* Gradients */
      --grad-primary: linear-gradient(135deg, #FF1AB8 0%, #7B2FFF 100%);
      --grad-holo:    linear-gradient(135deg, #FFE0F5 0%, #E4DEFF 40%, #D0F4FF 70%, #D0FFE8 100%);
      --grad-rainbow: linear-gradient(90deg, var(--r1), var(--r2), var(--r3), var(--r4), var(--r5), var(--r6));

      /* Shadows — purple-tinted */
      --shadow-xs: 0 1px 3px rgba(100, 40, 220, 0.08);
      --shadow-sm: 0 2px 8px rgba(100, 40, 220, 0.10);
      --shadow-md: 0 4px 16px rgba(100, 40, 220, 0.13), 0 1px 4px rgba(100, 40, 220, 0.07);
      --shadow-lg: 0 8px 28px rgba(100, 40, 220, 0.15), 0 2px 8px rgba(100, 40, 220, 0.08);
      --shadow-xl: 0 16px 48px rgba(100, 40, 220, 0.18), 0 4px 16px rgba(100, 40, 220, 0.10);

      /* Typography */
      --font-display: 'Orbitron', monospace;
      --font-body:    'Noto Sans SC', system-ui, sans-serif;
      --font-serif:   'Noto Serif SC', serif;

      /* 8-pt spacing grid */
      --sp-1: 4px;   --sp-2: 8px;   --sp-3: 12px;  --sp-4: 16px;
      --sp-5: 20px;  --sp-6: 24px;  --sp-8: 32px;  --sp-12: 48px;

      /* Radius tokens */
      --r-sm:   6px;
      --r-md:   12px;
      --r-lg:   18px;
      --r-xl:   24px;
      --r-pill: 999px;

      /* Easing tokens */
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:     cubic-bezier(0.16, 1.00, 0.30, 1);
      --ease-in-out:  cubic-bezier(0.40, 0.00, 0.20, 1);
    }

    /* ── Reset ── */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Keyframes ── */
    @keyframes holo-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 1;   transform: scale(1) rotate(0deg); }
      50%       { opacity: 0.4; transform: scale(1.6) rotate(180deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }
    @keyframes shimmer-sweep {
      0%   { transform: skewX(-15deg) translateX(-250%); }
      100% { transform: skewX(-15deg) translateX(600%); }
    }
    @keyframes bounce-in {
      0%   { transform: translate(-50%, -50%) scale(0.55); opacity: 0; }
      65%  { transform: translate(-50%, -50%) scale(1.04); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    #header {
      position: fixed;
      top: 12px; left: 12px; right: 12px;
      z-index: 200;
      /* Glass surface */
      background: var(--surface);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border-radius: var(--r-xl);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      /* Depth */
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.75) inset;
    }

    /* Iridescent border ring */
    #header::before {
      content: '';
      position: absolute;
      inset: -1.5px;
      border-radius: calc(var(--r-xl) + 1.5px);
      background: linear-gradient(135deg,
        var(--r1), var(--r2), var(--r3), var(--r4), var(--r5), var(--r6), var(--r1));
      background-size: 300% 300%;
      animation: holo-shift 5s ease infinite;
      z-index: -1;
    }

    .header-logo {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    /* Logo wordmark */
    .site-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(90deg, var(--pink) 0%, var(--violet) 55%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtitle — light tracking, quiet */
    .site-sub {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.16em;
    }

    /* Pulsing sparkle decorations */
    .star {
      font-size: 9px;
      display: inline-block;
      animation: sparkle 2s ease-in-out infinite;
      color: var(--pink);
      margin: 0 3px;
      vertical-align: middle;
    }
    .star:nth-child(2) { animation-delay: 0.7s;  color: var(--cyan);   }
    .star:nth-child(3) { animation-delay: 1.4s;  color: var(--violet); }

    /* ── Progress widget ── */
    #progress-wrap { text-align: right; }

    #progress-label {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 5px;
      letter-spacing: 0.04em;
    }
    #progress-label strong {
      color: var(--violet);
      font-weight: 700;
    }

    #progress-bar {
      width: 64px;
      height: 5px;
      background: var(--surface3);
      border-radius: var(--r-pill);
      overflow: hidden;
      margin-left: auto;
      border: 1px solid var(--border-mid);
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--grad-rainbow);
      background-size: 300% 100%;
      border-radius: var(--r-pill);
      transition: width 0.8s var(--ease-out);
      animation: holo-shift 3s linear infinite;
    }

    /* ═══════════════════════════════════════════
       MAP
    ═══════════════════════════════════════════ */
    #map { width: 100%; height: 100dvh; }

    /* ── Scrim ── */
    #sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(22, 0, 48, 0.38);
      backdrop-filter: blur(3px);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease-in-out);
    }
    #sheet-overlay.active { opacity: 1; pointer-events: auto; }

    /* ═══════════════════════════════════════════
       BOTTOM SHEET
    ═══════════════════════════════════════════ */
    #bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 400;
      background: var(--surface);
      backdrop-filter: blur(32px) saturate(220%);
      -webkit-backdrop-filter: blur(32px) saturate(220%);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      max-height: 85dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.42s var(--ease-out);
      overscroll-behavior: contain;
      box-shadow: var(--shadow-xl);
    }

    /* Rainbow top stripe — thicker, more intentional */
    #bottom-sheet::before {
      content: '';
      display: block;
      height: 4px;
      background: var(--grad-rainbow);
      background-size: 300% 100%;
      animation: holo-shift 3.5s linear infinite;
      flex-shrink: 0;
    }

    #bottom-sheet.open { transform: translateY(0); }

    /* Pull handle — thin and quiet */
    .sheet-handle {
      width: 32px;
      height: 3px;
      background: var(--border-hi);
      border-radius: var(--r-pill);
      margin: 10px auto 0;
    }

    /* ── Image area ── */
    .img-placeholder {
      width: 100%;
      min-height: 200px;
      background: var(--grad-holo);
      background-size: 400% 400%;
      animation: holo-shift 9s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin-top: 10px;
    }
    .img-placeholder svg { opacity: 0.28; color: var(--violet); }

    /* Image carousel */
    .image-carousel {
      position: relative;
      width: 100%;
      margin-top: 10px;
      background: #000;
      border-radius: var(--r-md);
      overflow: hidden;
      touch-action: pan-y pinch-zoom; /* 允许垂直滑动和缩放，禁止水平滑动 */
      user-select: none; /* 防止文本选择 */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-tap-highlight-color: transparent; /* 去除iOS点击高亮 */
    }
    .carousel-container {
      position: relative;
      width: 100%;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation; /* 优化触摸响应 */
    }
    .carousel-image {
      max-width: 100%;
      max-height: 400px;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      pointer-events: none; /* 防止图片干扰触摸事件 */
      transition: opacity 0.2s ease;
    }
    .carousel-image.swiping {
      opacity: 0.7; /* 滑动时的视觉反馈 */
    }
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s ease, transform 0.2s ease;
      z-index: 10;
      touch-action: manipulation; /* 确保按钮可点击 */
      -webkit-tap-highlight-color: transparent;
    }
    .carousel-nav:hover { background: rgba(0,0,0,0.7); }
    .carousel-nav:active { transform: translateY(-50%) scale(0.9); }
    .carousel-prev { left: 8px; }
    .carousel-next { right: 8px; }
    .carousel-indicators {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
      pointer-events: none; /* 防止指示器干扰滑动 */
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      pointer-events: auto; /* 允许点击指示器 */
      -webkit-tap-highlight-color: transparent;
    }
    .carousel-dot:hover { transform: scale(1.2); }
    .carousel-dot.active { background: white; }
    .carousel-counter {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      z-index: 10;
      pointer-events: none; /* 防止计数器干扰滑动 */
    }

    /* ── Sheet content area ── */
    #sheet-content { padding: var(--sp-5) var(--sp-6) var(--sp-12); }

    /* Era badge — Orbitron, pill, chrome-tinted */
    #sheet-era {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--violet);
      background: rgba(123, 47, 255, 0.07);
      border: 1px solid rgba(123, 47, 255, 0.24);
      border-radius: var(--r-pill);
      padding: 4px 12px;
      margin-bottom: var(--sp-3);
    }

    /* Location name — Serif, generous size */
    #sheet-name {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: var(--sp-1);
      letter-spacing: 0.01em;
    }

    /* Address row */
    #sheet-address {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: var(--sp-4);
      display: flex;
      align-items: flex-start;
      gap: var(--sp-1);
      line-height: 1.5;
    }
    #sheet-address svg { flex-shrink: 0; margin-top: 2px; }

    /* Separator — fades at edges */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-mid) 30%, var(--border-mid) 70%, transparent);
      margin: var(--sp-4) 0;
    }

    /* Description body */
    #sheet-desc {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.9;
      color: var(--text-2);
      letter-spacing: 0.015em;
    }

    /* ═══════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════ */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: var(--sp-5);
    }

    .btn {
      flex: 1;
      height: 50px;
      padding: 0 var(--sp-4);
      border-radius: var(--r-pill);   /* pill — key Y2K shape */
      border: none;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.14s var(--ease-out), box-shadow 0.18s var(--ease-out);
      letter-spacing: 0.04em;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active { transform: scale(0.95); }

    /* Nav button — chrome glass pill */
    .btn-nav {
      background: var(--surface2);
      color: var(--violet);
      border: 1.5px solid var(--border-mid);
      backdrop-filter: blur(12px);
      font-weight: 500;
    }
    /* Gloss highlight on nav button */
    .btn-nav::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 48%;
      background: linear-gradient(180deg, rgba(255,255,255,0.55), transparent);
      border-radius: var(--r-pill) var(--r-pill) 0 0;
      pointer-events: none;
    }
    .btn-nav:active { box-shadow: 0 0 0 3px rgba(123,47,255,0.14); }

    /* Check-in button — glossy Y2K liquid pill */
    .btn-checkin {
      background: var(--grad-primary);
      color: #fff;
      font-weight: 700;
      box-shadow: var(--shadow-md), 0 0 0 1px rgba(255,255,255,0.18) inset;
    }
    /* Top gloss — the signature Y2K liquid button treatment */
    .btn-checkin::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 48%;
      background: linear-gradient(180deg, rgba(255,255,255,0.30), transparent);
      border-radius: var(--r-pill) var(--r-pill) 0 0;
      pointer-events: none;
    }
    /* Shimmer sweep */
    .btn-checkin::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.26), transparent);
      transform: skewX(-15deg) translateX(-250%);
      animation: shimmer-sweep 3.5s linear infinite;
    }
    .btn-checkin:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }
    .btn-checkin:active { box-shadow: var(--shadow-xs); transform: scale(0.95); }

    /* States */
    .btn-checkin.disabled {
      background: var(--surface3);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
      border: 1.5px solid var(--border);
      font-weight: 500;
    }
    .btn-checkin.disabled::before,
    .btn-checkin.disabled::after { display: none; }

    .btn-checkin.done {
      background: transparent;
      color: var(--violet);
      border: 1.5px solid var(--violet);
      box-shadow: none;
      font-weight: 600;
    }
    .btn-checkin.done::before,
    .btn-checkin.done::after { display: none; }

    /* Distance text */
    #distance-hint {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      text-align: center;
      margin-top: var(--sp-2);
      letter-spacing: 0.03em;
    }

    /* ═══════════════════════════════════════════
       NAV MAP MODAL
    ═══════════════════════════════════════════ */
    #nav-modal {
      position: fixed; inset: 0;
      z-index: 500;
      display: flex;
      align-items: flex-end;
      background: rgba(22, 0, 48, 0.40);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s var(--ease-in-out);
    }
    #nav-modal.show { opacity: 1; pointer-events: auto; }

    #nav-panel {
      width: 100%;
      background: var(--surface);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: var(--sp-5) var(--sp-6) var(--sp-12);
      transform: translateY(100%);
      transition: transform 0.38s var(--ease-out);
      box-shadow: var(--shadow-xl);
    }
    #nav-modal.show #nav-panel { transform: translateY(0); }

    /* Nav panel title */
    .nav-title {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--violet);
      margin-bottom: var(--sp-4);
      text-align: center;
    }

    /* Nav option rows */
    .nav-option {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-3) var(--sp-2);
      border-top: 1px solid var(--border);
      cursor: pointer;
      border-radius: var(--r-md);
      margin: 0 calc(-1 * var(--sp-2));
      transition: background 0.12s ease;
    }
    .nav-option:active { background: var(--surface2); }

    .nav-icon {
      width: 42px; height: 42px;
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .nav-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    /* Cancel button — ghost pill */
    .nav-cancel {
      margin-top: var(--sp-3);
      width: 100%;
      height: 48px;
      background: var(--surface2);
      border: 1.5px solid var(--border-mid);
      border-radius: var(--r-pill);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.14s ease;
    }
    .nav-cancel:active { background: var(--surface3); }

    /* ═══════════════════════════════════════════
       CHECK-IN TOAST
    ═══════════════════════════════════════════ */
    #toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      z-index: 600;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(28px);
      border-radius: var(--r-xl);
      padding: var(--sp-8) var(--sp-8) var(--sp-6);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      min-width: 220px;
      box-shadow: var(--shadow-xl), 0 0 0 1px rgba(255,255,255,0.85) inset;
      background-clip: padding-box;
    }
    /* Iridescent border ring — same as header */
    #toast::before {
      content: '';
      position: absolute; inset: -1.5px;
      border-radius: calc(var(--r-xl) + 1.5px);
      background: linear-gradient(135deg,
        var(--r1), var(--r2), var(--r3), var(--r4), var(--r5), var(--r6), var(--r1));
      background-size: 300% 300%;
      animation: holo-shift 2.5s linear infinite;
      z-index: -1;
    }
    #toast.show {
      animation: bounce-in 0.48s var(--ease-spring) forwards;
    }
    #toast.hide {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.82);
      transition: all 0.26s var(--ease-in-out);
    }

    .toast-emoji {
      font-size: 44px;
      display: block;
      margin-bottom: var(--sp-2);
      animation: float 2.2s ease-in-out infinite;
    }
    .toast-title {

      <circle cx="4" cy="44" r="2.5" fill="#9933FF" opacity="0.6"/>
    </svg>`;
  } else {
    // 灰色旗，在浅色地图上足够显眼
    const stripes = ['#aaa','#999','#888','#777','#888','#999'];
    const s = stripes.map((c, i) =>
      `<rect x="6" y="${4 + i*6}" width="22" height="6" fill="${c}"/>`
    ).join('');
    return `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="44" viewBox="0 0 32 44">
      <rect x="2.5" y="0" width="3" height="44" fill="#bbb" rx="1.5"/>
      ${s}
      <circle cx="4" cy="44" r="2.5" fill="#ccc"/>
    </svg>`;
  }
}

// ────────────────────────────────────────────
// 距离计算（Haversine，单位：米）
// ────────────────────────────────────────────
function distance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  return m < 1000 ? `${Math.round(m)} 米` : `${(m/1000).toFixed(1)} 公里`;
}

// ────────────────────────────────────────────
// 进度
// ────────────────────────────────────────────
function updateProgress() {
  const count = Object.keys(checkedIn).length;
  const total = LOCATIONS.length;
  document.getElementById('checked-count').textContent = count;
  document.getElementById('total-count').textContent = total;
  document.getElementById('progress-fill').style.width = `${(count/total)*100}%`;
}

// ────────────────────────────────────────────
// 打卡按钮状态
// ────────────────────────────────────────────
function refreshCheckinBtn() {
  const btn = document.getElementById('checkin-btn');
  const hint = document.getElementById('distance-hint');
  if (!activeId) return;

  if (checkedIn[activeId]) {
    btn.textContent = '✓ 已打卡';
    btn.className = 'btn btn-checkin done';
    hint.textContent = '你已经来过这里了 🏳️‍🌈';
    return;
  }

  if (!currentLocation) {
    btn.textContent = '打卡';
    btn.className = 'btn btn-checkin disabled';
    hint.textContent = '正在获取你的位置…';
    return;
  }

  const loc = LOCATIONS.find(l => l.id === activeId);
  const d = distance(currentLocation.lat, currentLocation.lng, loc.lat, loc.lng);

  if (d <= 100) {
    btn.textContent = '✦ 打卡';
    btn.className = 'btn btn-checkin';
    hint.textContent = `📍 距离 ${fmtDist(d)}，可以打卡啦！`;
  } else {
    btn.textContent = '打卡';
    btn.className = 'btn btn-checkin disabled';
    hint.textContent = `距这里还有 ${fmtDist(d)}，走过去看看`;
  }
}

// ────────────────────────────────────────────
// 图片轮播控制
// ────────────────────────────────────────────
let currentImageIndex = {};
let touchStartX = 0;
let touchEndX = 0;

function showImage(locationId, index) {
  const loc = LOCATIONS.find(l => l.id === locationId);
  if (!loc || !loc.images || loc.images.length <= 1) return;
  
  const carousel = document.getElementById(`carousel-${locationId}`);
  if (!carousel) return;
  
  const img = carousel.querySelector('.carousel-image');
  const counter = carousel.querySelector('.carousel-counter');
  const dots = carousel.querySelectorAll('.carousel-dot');
  
  // 更新图片
  img.src = loc.images[index];
  
  // 更新计数器
  counter.textContent = `${index + 1} / ${loc.images.length}`;
  
  // 更新指示器
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === index);
  });
  
  // 记录当前索引
  currentImageIndex[locationId] = index;
}

function nextImage(locationId) {
  const loc = LOCATIONS.find(l => l.id === locationId);
  if (!loc || !loc.images || loc.images.length <= 1) return;
  
  const currentIndex = currentImageIndex[locationId] || 0;
  const nextIndex = (currentIndex + 1) % loc.images.length;
  showImage(locationId, nextIndex);
}

function prevImage(locationId) {
  const loc = LOCATIONS.find(l => l.id === locationId);
  if (!loc || !loc.images || loc.images.length <= 1) return;
  
  const currentIndex = currentImageIndex[locationId] || 0;
  const prevIndex = (currentIndex - 1 + loc.images.length) % loc.images.length;
  showImage(locationId, prevIndex);
}

// ────────────────────────────────────────────
// 触摸滑动支持
// ────────────────────────────────────────────
function initTouchSwipe(carouselElement, locationId) {
  if (!carouselElement) return;
  
  let isSwiping = false;
  
  carouselElement.addEventListener('touchstart', handleTouchStart, { passive: true });
  carouselElement.addEventListener('touchmove', handleTouchMove, { passive: true });
  carouselElement.addEventListener('touchend', handleTouchEnd, { passive: true });
  
  function handleTouchStart(e) {
    touchStartX = e.touches[0].clientX;
    isSwiping = false;
  }
  
  function handleTouchMove(e) {
    if (!touchStartX) return;
    
    const currentX = e.touches[0].clientX;
    const diff = Math.abs(currentX - touchStartX);
    
    // 当水平移动距离超过10px时，标记为正在滑动
    if (diff > 10) {
      isSwiping = true;
      const img = carouselElement.querySelector('.carousel-image');
      if (img) {
        img.classList.add('swiping');
      }
    }
  }
  
  function handleTouchEnd(e) {
    if (!touchStartX) return;
    
    const img = carouselElement.querySelector('.carousel-image');
    if (img) {
      img.classList.remove('swiping');
    }
    
    if (!isSwiping) {
      // 如果没有滑动，重置状态
      touchStartX = 0;
      touchEndX = 0;
      return;
    }
    
    touchEndX = e.changedTouches[0].clientX;
    const swipeDistance = touchEndX - touchStartX;
    const minSwipeDistance = 50; // 最小滑动距离
    
    if (Math.abs(swipeDistance) > minSwipeDistance) {
      if (swipeDistance > 0) {
        // 向右滑动 - 显示上一张
        prevImage(locationId);
      } else {
        // 向左滑动 - 显示下一张
        nextImage(locationId);
      }
    }
    
    // 重置触摸位置
    touchStartX = 0;
    touchEndX = 0;
    isSwiping = false;
  }
}

// ────────────────────────────────────────────
// 打开详情面板
// ────────────────────────────────────────────
function openSheet(id) {
  const loc = LOCATIONS.find(l => l.id === id);
  if (!loc) return;
  activeId = id;

  document.getElementById('sheet-era').textContent = loc.era;
  document.getElementById('sheet-name').textContent = loc.name;
  document.getElementById('sheet-addr-text').textContent = loc.address;
  document.getElementById('sheet-desc').textContent = loc.desc;

  const wrap = document.getElementById('sheet-img-wrap');
  
  // 处理视频
  if (loc.image && (loc.image.includes('youtu.be') || loc.image.includes('youtube.com'))) {
    // 提取YouTube视频ID
    let videoId = '';
    if (loc.image.includes('youtu.be/')) {
      videoId = loc.image.split('youtu.be/')[1].split('?')[0];
    } else if (loc.image.includes('youtube.com/watch?v=')) {
      videoId = loc.image.split('v=')[1].split('&')[0];
    }
    
    if (videoId) {
      wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" 
        style="width:100%;height:190px;border:none;display:block;margin-top:10px;" 
        allowfullscreen></iframe>`;
    } else {
      wrap.innerHTML = `<div class="img-placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>视频链接无效</span>
      </div>`;
    }
  }
  // 处理图片轮播
  else if (loc.images && loc.images.length > 0) {
    if (loc.images.length === 1) {
      // 单张图片直接显示
      wrap.innerHTML = `<img src="${loc.images[0]}" style="max-width:100%;max-height:400px;width:auto;height:auto;object-fit:contain;display:block;margin:10px auto;" alt="${loc.name}">`;
    } else {
      // 多张图片创建轮播
      const carouselId = `carousel-${loc.id}`;
      let indicators = '';
      for (let i = 0; i < loc.images.length; i++) {
        indicators += `<span class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="showImage(${loc.id}, ${i})"></span>`;
      }
      
      wrap.innerHTML = `
        <div class="image-carousel" id="${carouselId}">
          <div class="carousel-container">
            <img src="${loc.images[0]}" class="carousel-image" alt="${loc.name}">
            <button class="carousel-nav carousel-prev" onclick="prevImage(${loc.id})">‹</button>
            <button class="carousel-nav carousel-next" onclick="nextImage(${loc.id})">›</button>
            <div class="carousel-counter">1 / ${loc.images.length}</div>
            <div class="carousel-indicators">${indicators}</div>
          </div>
        </div>
      `;
      
      // 初始化触摸滑动
      setTimeout(() => {
        const carouselElement = document.getElementById(carouselId);
        if (carouselElement) {
          initTouchSwipe(carouselElement, loc.id);
        }
      }, 100);
    }
  }
  // 无图片或视频
  else {
    wrap.innerHTML = `<div class="img-placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span>历史照片 · 待填入</span>
    </div>`;
  }

  refreshCheckinBtn();
  document.getElementById('sheet-overlay').classList.add('active');
  document.getElementById('bottom-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('active');
  document.getElementById('bottom-sheet').classList.remove('open');
  
  // 清理轮播状态
  if (activeId) {
    delete currentImageIndex[activeId];
  }
  
  activeId = null;
}

// ────────────────────────────────────────────
// 打卡
// ────────────────────────────────────────────
function doCheckin() {
  if (!activeId) return;
  const btn = document.getElementById('checkin-btn');
  if (btn.classList.contains('disabled') || btn.classList.contains('done')) return;

  checkedIn[activeId] = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedIn));

  const marker = markers[activeId];
  if (marker) {
    marker.setContent(`<div class="flag-marker">${flagSVG(true)}</div>`);
  }

  updateProgress();
  refreshCheckinBtn();

  const loc = LOCATIONS.find(l => l.id === activeId);
  showToast(loc.name);
}

function showToast(name) {
  document.getElementById('toast-name').textContent = name;
  const t = document.getElementById('toast');
  t.classList.remove('hide');
  t.classList.add('show');
  setTimeout(() => {
    t.classList.remove('show');
    t.classList.add('hide');
  }, 2800);
}

// ────────────────────────────────────────────
// 导航
// ────────────────────────────────────────────
function showNavModal() {
  document.getElementById('nav-modal').classList.add('show');
}

function hideNavModal(e) {
  if (!e || e.target === document.getElementById('nav-modal')) {
    document.getElementById('nav-modal').classList.remove('show');
  }
}

function navigate(app) {
  const loc = LOCATIONS.find(l => l.id === activeId);
  if (!loc) return;
  const { lat, lng, name } = loc;
  const encName = encodeURIComponent(name);

  let url = '';
  switch(app) {
    case 'amap':
      url = `iosamap://path?sourceApplication=QueerGO&dlat=${lat}&dlon=${lng}&dname=${encName}&dev=0`;
      setTimeout(() => { window.open(`https://uri.amap.com/navigation?to=${lng},${lat},${encName}&mode=walking&src=QueerGO`, '_blank'); }, 500);
      break;
    case 'baidu':
      url = `baidumap://map/direction?destination=latlng:${lat},${lng}|name:${encName}&mode=walking&src=QueerGO`;
      setTimeout(() => { window.open(`https://api.map.baidu.com/direction?destination=latlng:${lat},${lng}|name:${encName}&mode=walking&output=html&src=QueerGO`, '_blank'); }, 500);
      break;
    case 'apple':
      url = `maps://?daddr=${lat},${lng}&dirflg=w`;
      break;
    case 'google':
      url = `comgooglemaps://?daddr=${lat},${lng}&directionsmode=walking`;
      setTimeout(() => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`, '_blank'); }, 500);
      break;
  }

  if (url) {
    const a = document.createElement('a');
    a.href = url; a.click();
  }
  hideNavModal();
}

// ────────────────────────────────────────────
// 初始化地图
// ────────────────────────────────────────────
function initMap() {
  map = new AMap.Map('map', {
    zoom: 13,
    center: [116.4074, 39.9042],
    mapStyle: 'amap://styles/whitesmoke',   // 浅色底图，灰旗清晰可见
    showLabel: true,
    resizeEnable: true,
  });

  LOCATIONS.forEach(loc => {
    const colored = !!checkedIn[loc.id];
    const marker = new AMap.Marker({
      position: new AMap.LngLat(loc.lng, loc.lat),
      content: `<div class="flag-marker">${flagSVG(colored)}</div>`,
      offset: new AMap.Pixel(-16, -44),
      title: loc.name,
    });
    marker.on('click', () => openSheet(loc.id));
    marker.setMap(map);
    markers[loc.id] = marker;
  });

  const geolocation = new AMap.Geolocation({
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0,
    buttonOffset: new AMap.Pixel(12, 90),
    showButton: true,
    buttonPosition: 'RB',
  });
  map.addControl(geolocation);

  geolocation.getCurrentPosition((status, result) => {
    if (status === 'complete') {
      currentLocation = { lat: result.position.lat, lng: result.position.lng };
      refreshCheckinBtn();
    }
  });

  // 移除持续位置监听，避免反复弹出位置请求
  // geolocation.watchPosition((status, result) => {
  //   if (status === 'complete') {
  //     currentLocation = { lat: result.position.lat, lng: result.position.lng };
  //     if (activeId) refreshCheckinBtn();
  //   }
  // });

  updateProgress();
}

// ────────────────────────────────────────────
// 启动
// ────────────────────────────────────────────
window.onload = () => {
  if (typeof AMap !== 'undefined') {
    initMap();
  } else {
    document.getElementById('map').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
        height:100%;gap:16px;color:#7a6a9a;padding:40px;text-align:center;
        background:linear-gradient(135deg,#f8f0ff,#f0f8ff);">
        <div style="font-size:48px">🏳️‍🌈</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;
          background:linear-gradient(90deg,#FF2D9B,#9B30FF);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;">
          地图加载失败
        </div>
        <div style="font-size:13px;line-height:1.8;color:#7a6a9a;">
          请检查高德地图 API Key 是否已正确填入<br>或确认网络连接正常
        </div>
      </div>`;
  }
};
</script>
